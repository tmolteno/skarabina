_include:
  - (skarabina_cargo):
      - skarabina.yml

# ---------------------------------------------------------------------------
# recipe: flag-and-average
# ---------------------------------------------------------------------------
flag-and-average:
  info: "Flag, average, and optimize a measurement set"
  inputs:
    ms: MS

  steps:
    process:
      cab: skarabina
      params:
        ms: =recipe.ms
        flag-nan: true
        flag-clip: [0, 100]
        flag-uv-above: 1000
        time-average-factor: 3
        frequency-average-factor: 20
        optimize: true
        msout: cleaned.ms
        clobber: true
        barber: true
        summary: true

# ---------------------------------------------------------------------------
# recipe: flag-only
# ---------------------------------------------------------------------------
flag-only:
  info: "Flag a measurement set without averaging"
  inputs:
    ms: MS

  steps:
    flag:
      cab: skarabina
      params:
        ms: =recipe.ms
        flag-nan: true
        flag-clip: [0, 100]
        flag-uv-above: 1000
        summary: true

# ---------------------------------------------------------------------------
# recipe: analyze
# ---------------------------------------------------------------------------
analyze:
  info: "Analyze a measurement set and recommend an image size"
  inputs:
    ms: MS

  steps:
    image-size:
      cab: skarabina-analyze
      params:
        ms: =recipe.ms
        image-fov: 2.5
        oversampling-factor: 5.0
        output-json: analysis.json
