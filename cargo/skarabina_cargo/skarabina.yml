_include:
  - genesis/skarabina-cargo-base.yml

cabs:
  skarabina:
    name: skarabina
    info: "skarabina (dung beetle) -- A basic 1GC flagger"
    image:
      _use: vars.skarabina-cargo.images
      name: skarabina
    command: skarabina
    inputs:
      ms:
        dtype: MS
        info: The input measurement set
        required: true
      summary:
        dtype: bool
        info: Print the flagging summary
        default: false
      optimize:
        dtype: bool
        info: Opotimize the size of the measurement set while keeping all rows of equal length.
        default: false
      time-average-factor:
        dtype: int
        info: Combine every N consecutive rows by averaging UVW and visibility data. Must run before optimize.
        default: 1
      frequency-average-factor:
        dtype: int
        info: Combine every N consecutive frequency channels by averaging. Flagged data is excluded from the average.
        default: 1
      clobber:
        dtype: bool
        info: Replace the output measurement set
        default: false
      barber:
        dtype: bool
        info: Perform barber flagging (removes fringes in a jiffy)
      barber.pol:
        dtype: int
        info: Polarization selection for barber.
      apply:
        dtype: bool
        default: false
      flag:
        uv-above:
          dtype: float
          info: Flag UVW above this limit (in meters).
        nan:
          dtype: bool
          info: Flag NaN
        clip:
          dtype: Tuple[float, float]
          info: Flag clip.
        spectral-window:
          dtype: File
          info: YAML file with spectral window flagging rules.
      # field:
      #     dtype: List[int]
      #     info: Use this FIELD_ID from the measurement set
      debug:
        info: Switch on debugging output
        dtype: bool
        default: false
      field-of-view:
        dtype: float
        info: Field-of-view half-width from phase centre (degrees). Used for fringe-rotation integration time calculation. Default 1.0°.
        default: 1.0
    outputs:
      msout:
        dtype: MS
        info: The output measurement set
        required: false
      reference-antenna:
        dtype: int
        info: A recommended reference antenna (close to the core and least flagged)
      max-uv:
        dtype: float
        info: The maximum uv coordinate in the MS.

  skarabina-analyze:
    name: skarabina-analyze
    info: "skarabina-analyze -- recommend an image size for synthesis imaging"
    image:
      _use: vars.skarabina-cargo.images
      name: skarabina
    command: skarabina-analyze
    inputs:
      ms:
        dtype: MS
        info: The input measurement set
        required: true
      image-fov:
        dtype: float
        info: Image field-of-view (degrees)
        required: true
      oversampling-factor:
        dtype: float
        info: Pixels per resolution element (synthesised beam)
        default: 5.0
      output-json:
        dtype: File
        info: Write analysis results as JSON to this file
